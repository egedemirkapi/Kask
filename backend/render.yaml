services:
  - type: web
    name: classcontrol-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://classcontrol.vercel.app
      - key: ENVIRONMENT
        value: production
